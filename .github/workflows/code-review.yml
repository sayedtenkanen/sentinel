name: Code Review Bot

on:
  pull_request:
    paths:
      - '**.py'
  push:
    branches: [main]
    paths:
      - '**.py'
  workflow_dispatch:

jobs:
  ruff-ty:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ruff + ty
        run: pip install ruff ty
      - name: Ruff lint
        run: python -m ruff check sentinel/ tests/
      - name: Ruff format check
        run: python -m ruff format --check sentinel/ tests/
      - name: Ty type check
        run: python -m ty check sentinel/

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e .
      - name: Secrets scan staged files
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            files=$(git diff --name-only --diff-filter=AM ${{ github.event.pull_request.base.sha }}...HEAD -- '*.py')
          else
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              base=HEAD~1
            else
              base=$(git rev-list --max-parents=0 HEAD)
            fi
            files=$(git diff --name-only --diff-filter=AM "$base" -- '*.py')
          fi
          if [ -n "$files" ]; then
            scan_files=$(echo "$files" | tr ' ' '\n' | grep -v '^tests/' | tr '\n' ' ' | xargs)
            if [ -n "$scan_files" ]; then
              python -m sentinel.tools.secrets_scanner $scan_files
            else
              echo "No files to scan (all in tests/)."
            fi
          else
            echo "No files to scan."
          fi

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          pip install -e .
          pip install coverage
      - name: Run unit tests
        run: |
          python -m coverage run -m unittest discover -s tests/ -q
          python -m coverage report --fail-under=85 --omit="sentinel/test/*"
      - name: Run pentesting tests
        run: python -m unittest tests.test_security_pentest -v

  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e .
      - name: Run eval suite
        run: python -m sentinel.test.evals

  review:
    needs: [ruff-ty, security-scan, unit-tests, evals]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e .
      - name: Review changed files
        id: review
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            files=$(git diff --name-only --diff-filter=AM ${{ github.event.pull_request.base.sha }}...HEAD -- '*.py')
          else
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              base=HEAD~1
            else
              base=$(git rev-list --max-parents=0 HEAD)
            fi
            files=$(git diff --name-only --diff-filter=AM "$base" -- '*.py')
          fi
          if [ -z "$files" ]; then
            echo "report={}" >> $GITHUB_OUTPUT
            exit 0
          fi
          python -m sentinel.deploy.runner $files --format json -o review_report.json
      - name: Post PR comment
        if: github.event_name == 'pull_request' && steps.review.outputs.report != '{}'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('review_report.json', 'utf8'));
            if (!report.findings || report.findings.length === 0) return;
            const sev = {critical: 0, high: 0, medium: 0, low: 0, info: 0};
            for (const f of report.findings) sev[f.severity] = (sev[f.severity] || 0) + 1;
            let body = `## 🤖 Code Review Bot\n\n**Score:** ${report.score}/100\n**Findings:** ${report.findings.length}\n\n`;
            body += `| Severity | Count |\n|---------|-------|\n| 🔴 Critical | ${sev.critical} |\n`;
            body += `| 🟠 High | ${sev.high} |\n| 🟡 Medium | ${sev.medium} |\n`;
            body += `| 🔵 Low | ${sev.low} |\n| ⚪ Info | ${sev.info} |\n\n### Top Issues\n\n`;
            const order = {critical: 0, high: 1, medium: 2, low: 3, info: 4};
            report.findings.sort((a, b) => order[a.severity] - order[b.severity]);
            for (const f of report.findings.slice(0, 10))
              body += `- **${f.severity.toUpperCase()}** \`${f.rule_id}\`: ${f.message} (${f.file}:${f.line || '-'})\n`;
            if (report.findings.length > 10)
              body += `\n*...and ${report.findings.length - 10} more findings*\n`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });
